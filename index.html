<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbanstay 후기 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--sidebar:#13151f;--card:#1a1d2b;--card2:#1f2235;--accent:#5b8dee;--green:#3ecf8e;--red:#f06565;--yellow:#f5a623;--text:#dde3f0;--text2:#7f8ba8;--text3:#4a5370;--border:#252a3d;--border2:#2d3350;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-logo{padding:20px 16px 12px;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;border-bottom:1px solid var(--border);}
.sidebar-logo span{display:block;font-size:11px;font-weight:400;color:var(--text2);margin-top:2px;}
.sidebar-menu{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-menu::-webkit-scrollbar{width:3px;}
.sidebar-menu::-webkit-scrollbar-thumb{background:var(--border2);}
.menu-item{padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.menu-item:hover{color:var(--text);background:rgba(91,141,238,0.06);}
.menu-item.active{color:var(--accent);background:rgba(91,141,238,0.1);border-left-color:var(--accent);}
.menu-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:700;}
.period-select{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;}
.topbar-meta{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:5px;}
.up{color:var(--green);}.down{color:var(--red);}
.charts-row{display:grid;grid-template-columns:1fr 360px;gap:12px;margin-bottom:20px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.chart-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rank-tabs{display:flex;gap:6px;}
.rank-tab{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;font-family:'Noto Sans KR',sans-serif;}
.rank-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.rank-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;}
.rank-list::-webkit-scrollbar{width:3px;}
.rank-list::-webkit-scrollbar-thumb{background:var(--border2);}
.rank-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background 0.15s;}
.rank-item:hover{background:rgba(91,141,238,0.08);}
.rank-item.warn{background:rgba(248,113,113,0.06);border-left:2px solid var(--red);}
.rank-num{font-size:10px;font-weight:700;color:var(--text3);width:14px;text-align:center;font-family:'DM Mono',monospace;}
.rank-name{font-size:12px;flex:1;color:var(--text);}
.rank-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rank-bar{height:100%;border-radius:2px;}
.rank-score{font-size:12px;font-family:'DM Mono',monospace;width:34px;text-align:right;}
.rank-diff{font-size:10px;font-family:'DM Mono',monospace;width:40px;text-align:right;}
.rank-diff.up{color:var(--green);}.rank-diff.down{color:var(--red);}.rank-diff.neu{color:var(--text3);}
.channel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.channel-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.channel-name{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.channel-score{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.channel-sub{font-size:11px;color:var(--text2);margin-top:5px;}
.channel-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.channel-bar{height:100%;border-radius:2px;}
.increase-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;}
.increase-list::-webkit-scrollbar{width:3px;}
.increase-list::-webkit-scrollbar-thumb{background:var(--border2);}
.increase-item{display:flex;align-items:center;gap:8px;padding:3px 0;}
.increase-label{font-size:11px;color:var(--text2);width:48px;font-family:'DM Mono',monospace;white-space:nowrap;}
.increase-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.increase-bar{height:100%;border-radius:3px;}
.increase-val{font-size:11px;font-family:'DM Mono',monospace;width:38px;text-align:right;}
.alert-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.alert-card{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:14px 16px;}
.alert-title{font-size:11px;color:var(--red);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(248,113,113,0.1);cursor:pointer;}
.alert-item:last-child{border-bottom:none;}
.alert-item:hover{opacity:0.8;}
.alert-name{font-size:12px;color:var(--text);}
.alert-score{font-size:12px;font-family:'DM Mono',monospace;color:var(--red);font-weight:600;}
.change-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.change-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--card2);border-radius:6px;cursor:pointer;}
.change-item:hover{background:rgba(91,141,238,0.08);}
.change-name{font-size:12px;color:var(--text);}
.change-val{font-size:12px;font-family:'DM Mono',monospace;font-weight:600;}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#7f8ba8;">데이터 불러오는 중...</div>
</div>
<div class="sidebar">
  <div class="sidebar-logo">Urbanstay<span>후기 대시보드</span></div>
  <div class="sidebar-menu">
    <div class="menu-section">전체</div>
    <div class="menu-item active" onclick="selectBranch(null,this)">전체 현황</div>
    <div class="menu-section">지점</div>
    <div id="branchMenu"></div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">전체 현황</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <select class="period-select" id="periodSelect" onchange="onPeriodChange()"><option value="">주차 선택</option></select>
      <div class="topbar-meta" id="lastUpdated">로딩 중...</div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbxlLEEMdDhciULkGjubEqIscc4WA2CpU_ba3NPvLOruYCC8x-Q8xA6xJlv5ux5d803gpA/exec';
const EXCLUDED=['03.동탄','09.여수'];
const OTA_MAP={
  '02.서면':'서면','03.동탄':'동탄','04.명동':'명동',
  '05.제주공항':'제주공항','06.부산역':'부산역',
  '07.송도달빛공원':'송달공','08.속초해변C':'속초C',
  '09.여수':'여수','10.등대해변':'속초등대',
  '11.부산시청':'부산시청','12.부산기장':'부산기장',
  '13.남포BIFF':'남포','14.울산':'울산',
  '15.시그니티':'시그니티','17.익선':'익선',
  '18.웨이브파크':'웨이브파크','19.부산송도해변':'부송해',
  '20.로이움':'로이움','21.당진터미널':'당진',
  '22.속초해변AB':'속초AB','23.인천차이나타운':'인차타',
  '24.해운대패러그라프':'패러그라프','25.거북섬':'거북섬',
  '26.해운대역':'해운대역','27.낙산해변':'낙산',
  '28.속초해변':'르컬속초','29.속초중앙':'르컬중앙',
  '30.호텔 동탄':'동탄(호텔)','31.속초자이엘라':'속초자이엘라'
};

let otaData=[],googleData=[],tripData=[];
let currentBranch=null,currentPeriod='';
let trendChart=null;
let rankMode='google';

async function loadAll(){
  try{
    const [o,g,t]=await Promise.all([
      fetch(API+'?sheet=ota').then(r=>r.json()),
      fetch(API+'?sheet=google').then(r=>r.json()),
      fetch(API+'?sheet=tripadvisor').then(r=>r.json())
    ]);
    otaData=o;googleData=g;tripData=t;
    initPeriods();initBranchMenu();render();
    document.getElementById('lastUpdated').textContent=new Date().toLocaleDateString('ko-KR')+' 기준';
    document.getElementById('loadingScreen').style.display='none';
  }catch(e){
    document.getElementById('loadingScreen').innerHTML='<div style="color:#f06565;font-size:14px;">로드 실패: '+e.message+'</div>';
  }
}

function initPeriods(){
  const gPeriods=[...new Set(googleData.map(d=>d.주차))];
  const sel=document.getElementById('periodSelect');
  gPeriods.forEach(p=>sel.add(new Option(p,p)));
  currentPeriod=gPeriods[gPeriods.length-1]||'';
  sel.value=currentPeriod;
}

function initBranchMenu(){
  const branches=[...new Set(googleData.map(d=>d.지점))].filter(b=>!EXCLUDED.includes(b)).sort();
  document.getElementById('branchMenu').innerHTML=branches.map(b=>
    `<div class="menu-item" onclick="selectBranch('${b}',this)">${b}</div>`
  ).join('');
}

function onPeriodChange(){currentPeriod=document.getElementById('periodSelect').value;render();}
function selectBranch(branch,el){
  currentBranch=branch;
  document.querySelectorAll('.menu-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pageTitle').textContent=branch||'전체 현황';
  render();
}
function render(){currentBranch?renderBranch():renderOverall();}
function scoreColor(s){
  if(s>=9)return'#3ecf8e';
  if(s>=8)return'#5b8dee';
  if(s>=7)return'#f5a623';
  return'#f06565';
}
function setRankMode(mode){
  rankMode=mode;
  document.querySelectorAll('.rank-tab').forEach(el=>el.classList.toggle('active',el.dataset.mode===mode));
  renderRankList();
}

let _branchRanks=[];
let _otaRanks=[];

function renderRankList(){
  const list=document.getElementById('rankList');
  if(!list)return;
  const ranks=rankMode==='google'?_branchRanks:_otaRanks;
  const maxS=Math.max(...ranks.map(b=>b.score),rankMode==='google'?5:10);
  const warnThres=rankMode==='google'?4.0:8.5;
  list.innerHTML=ranks.slice(0,25).map((b,i)=>{
    const warn=b.score>0&&b.score<warnThres;
    return`<div class="rank-item${warn?' warn':''}" onclick="selectBranchByName('${b.name}')">
      <div class="rank-num">${i+1}</div>
      <div class="rank-name">${b.name.replace(/^\d+\./,'')}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(b.score/maxS*100).toFixed(0)}%;background:${scoreColor(rankMode==='google'?b.score*2:b.score)}"></div></div>
      <div class="rank-score" style="color:${scoreColor(rankMode==='google'?b.score*2:b.score)}">${b.score||'-'}</div>
      <div class="rank-diff ${b.diff>0?'up':b.diff<0?'down':'neu'}">${b.diff>0?'+':''}${b.diff!==0?b.diff:'-'}</div>
    </div>`;
  }).join('');
}

function renderOverall(){
  const gPeriods=[...new Set(googleData.map(d=>d.주차))];
  const otaPeriods=[...new Set(otaData.map(d=>d.주차))];
  const tPeriods=[...new Set(tripData.map(d=>d.주차))];
  const otaLatest=otaPeriods[otaPeriods.length-1]||'';
  const tLatest=tPeriods[tPeriods.length-1]||'';
  const prevP=gPeriods[gPeriods.indexOf(currentPeriod)-1]||'';

  const otaLatestRows=otaData.filter(d=>d.주차===otaLatest);
  const otaAvg=otaLatestRows.length?otaLatestRows.reduce((s,d)=>s+d.환산점수,0)/otaLatestRows.length:0;
  const totalRev=otaLatestRows.reduce((s,d)=>s+d.리뷰갯수,0);

  const gCur=googleData.filter(d=>d.주차===currentPeriod&&!EXCLUDED.includes(d.지점));
  const gAvg=gCur.length?gCur.reduce((s,d)=>s+d.평점,0)/gCur.length:0;
  const gInc=gCur.reduce((s,d)=>s+d.증감,0);

  const tCur=tripData.filter(d=>d.주차===tLatest&&d.후기갯수>0);
  const tAvg=tCur.length?tCur.reduce((s,d)=>s+d.평점,0)/tCur.length:0;

  const totalAvg=((otaAvg+gAvg*2+tAvg*2)/3).toFixed(2);

  // 구글 지점 순위
  _branchRanks=[...new Set(googleData.map(d=>d.지점))].filter(b=>!EXCLUDED.includes(b)).map(b=>{
    const c=googleData.find(d=>d.지점===b&&d.주차===currentPeriod);
    const pv=googleData.find(d=>d.지점===b&&d.주차===prevP);
    return{name:b,score:c?c.평점:0,diff:c&&pv?+(c.평점-pv.평점).toFixed(2):0};
  }).filter(b=>b.score>0).sort((a,b)=>b.score-a.score);

  // OTA 지점 순위
  _otaRanks=[...new Set(otaData.map(d=>d.지점))].map(bShort=>{
    const rows=otaData.filter(d=>d.지점===bShort&&d.주차===otaLatest);
    const avg=rows.length?+(rows.reduce((s,d)=>s+d.환산점수,0)/rows.length).toFixed(2):0;
    const prevRows=otaData.filter(d=>d.지점===bShort&&d.주차===otaPeriods[otaPeriods.length-2]);
    const prevAvg=prevRows.length?+(prevRows.reduce((s,d)=>s+d.환산점수,0)/prevRows.length).toFixed(2):0;
    // OTA 이름 → 구글 이름으로 역매핑
    const fullName=Object.keys(OTA_MAP).find(k=>OTA_MAP[k]===bShort)||bShort;
    return{name:fullName,score:avg,diff:avg&&prevAvg?+(avg-prevAvg).toFixed(2):0};
  }).filter(b=>b.score>0&&!EXCLUDED.includes(b.name)).sort((a,b)=>b.score-a.score);

  // 경고 지점 (구글 4.0 미만)
  const gWarn=_branchRanks.filter(b=>b.score>0&&b.score<4.0);
  // 경고 지점 (OTA 8.5 미만)
  const otaWarn=_otaRanks.filter(b=>b.score>0&&b.score<8.5);

  // 평점 변동 큰 지점 (구글)
  const bigChange=[..._branchRanks].filter(b=>b.diff!==0).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,6);

  // OTA 채널별 전체 평균
  const channels=[...new Set(otaLatestRows.map(d=>d.OTA))];
  const chAvgs=channels.map(ch=>{
    const rows=otaLatestRows.filter(d=>d.OTA===ch);
    return{name:ch,score:rows.length?+(rows.reduce((s,d)=>s+d.환산점수,0)/rows.length).toFixed(2):0};
  }).filter(c=>c.score>0).sort((a,b)=>b.score-a.score);

  const gp=gPeriods.slice(-16);
  const incTrend=gp.map(p=>googleData.filter(d=>d.주차===p&&!EXCLUDED.includes(d.지점)).reduce((s,d)=>s+d.증감,0));

  document.getElementById('mainContent').innerHTML=`
    <div class="summary-row">
      <div class="stat-card"><div class="stat-label">전체 통합 점수</div><div class="stat-value" style="color:${scoreColor(totalAvg)}">${totalAvg}</div><div class="stat-sub">OTA+구글+트립 (10점 만점)</div></div>
      <div class="stat-card"><div class="stat-label">총 리뷰 수</div><div class="stat-value">${(totalRev/1000).toFixed(1)}K</div><div class="stat-sub">OTA 전체 합산</div></div>
      <div class="stat-card"><div class="stat-label">관리 지점 수</div><div class="stat-value">${_branchRanks.length}</div><div class="stat-sub">전국 지점</div></div>
      <div class="stat-card"><div class="stat-label">이번 주 증감</div><div class="stat-value" style="color:${gInc>=0?'var(--green)':'var(--red)'}">${gInc>=0?'+':''}${gInc}</div><div class="stat-sub">전주 대비 구글 후기</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">주간 구글 후기 증감 추이 (최근 16주)</div>
        <div class="increase-list">
          ${gp.map((p,i)=>{const v=incTrend[i];const mx=Math.max(...incTrend.map(Math.abs),1);return`<div class="increase-item"><div class="increase-label">${p.split('~')[0].trim().split('.').slice(1).join('/')}</div><div class="increase-bar-wrap"><div class="increase-bar" style="width:${(Math.abs(v)/mx*100).toFixed(0)}%;background:${v>=0?'var(--green)':'var(--red)'}"></div></div><div class="increase-val" style="color:${v>=0?'var(--green)':'var(--red)'}">${v>=0?'+':''}${v}</div></div>`;}).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">
          지점 평점 순위
          <div class="rank-tabs">
            <button class="rank-tab active" data-mode="google" onclick="setRankMode('google')">구글</button>
            <button class="rank-tab" data-mode="ota" onclick="setRankMode('ota')">OTA</button>
          </div>
        </div>
        <div class="rank-list" id="rankList"></div>
      </div>
    </div>

    <div class="section-label">OTA 채널별 전체 평균</div>
    <div class="channel-grid" style="margin-bottom:20px;">
      ${chAvgs.map(c=>`<div class="channel-card">
        <div class="channel-name">${c.name}</div>
        <div class="channel-score" style="color:${scoreColor(c.score)}">${c.score}<span style="font-size:12px;color:var(--text2);font-weight:400;"> /10</span></div>
        <div class="channel-bar-wrap"><div class="channel-bar" style="width:${(c.score/10*100).toFixed(0)}%;background:${scoreColor(c.score)}"></div></div>
      </div>`).join('')}
    </div>

    ${bigChange.length?`
    <div class="chart-card">
      <div class="chart-title">이번 주 평점 변동 큰 지점 (구글 기준)</div>
      <div class="change-grid">
        ${bigChange.map(b=>`<div class="change-item" onclick="selectBranchByName('${b.name}')">
          <div class="change-name">${b.name.replace(/^\d+\./,'')}</div>
          <div class="change-val" style="color:${b.diff>0?'var(--green)':'var(--red)'}">${b.diff>0?'+':''}${b.diff}</div>
        </div>`).join('')}
      </div>
    </div>`:''}
  `;

  renderRankList();
}

function renderBranch(){
  const b=currentBranch;
  const bShort=OTA_MAP[b]||b.replace(/^\d+\./,'').trim();
  const gRows=googleData.filter(d=>d.지점===b);
  const periods=[...new Set(gRows.map(d=>d.주차))];
  const recent=periods.slice(-16);
  const curG=gRows.find(d=>d.주차===currentPeriod);
  const gScore=curG?curG.평점:0;
  const gInc=curG?curG.증감:0;
  const gReviews=curG?curG.후기갯수:0;

  const tBranchPeriods=[...new Set(tripData.filter(d=>d.지점===b).map(d=>d.주차))];
  const tBranchLatest=tBranchPeriods[tBranchPeriods.length-1]||'';
  const curT=tripData.find(d=>d.지점===b&&d.주차===tBranchLatest&&d.후기갯수>0);
  const tScore=curT?curT.평점:0;

  const otaPeriods=[...new Set(otaData.filter(d=>d.지점===bShort).map(d=>d.주차))];
  const otaLatest=otaPeriods[otaPeriods.length-1]||'';
  const otaBranch=otaData.filter(d=>d.지점===bShort&&d.주차===otaLatest);
  const otaAvgBranch=otaBranch.length?otaBranch.reduce((s,d)=>s+d.환산점수,0)/otaBranch.length:0;

  const channelCards=[
    ...otaBranch.map(d=>({name:d.OTA,score:d.환산점수,sub:`리뷰 ${d.리뷰갯수.toLocaleString()}개`,max:10})),
    {name:'구글',score:gScore?+(gScore*2).toFixed(2):0,sub:`원점수 ${gScore}/5`,max:10},
    {name:'트립어드바이저',score:tScore?+(tScore*2).toFixed(2):0,sub:`원점수 ${tScore}/5`,max:10}
  ];

  const gTrend=recent.map(p=>{const r=gRows.find(d=>d.주차===p);return r?r.평점:null;});
  const gIncTrend=recent.map(p=>{const r=gRows.find(d=>d.주차===p);return r?r.증감:0;});

  document.getElementById('mainContent').innerHTML=`
    <div class="summary-row">
      <div class="stat-card"><div class="stat-label">구글 평점</div><div class="stat-value" style="color:${scoreColor(gScore*2)}">${gScore?+(gScore*2).toFixed(1):'-'}</div><div class="stat-sub"><span class="${gInc>=0?'up':'down'}">${gInc>=0?'▲':'▼'}${Math.abs(gInc)}</span> 원점수 ${gScore}/5</div></div>
      <div class="stat-card"><div class="stat-label">관리 채널 수</div><div class="stat-value">${channelCards.length}</div><div class="stat-sub">OTA+구글+트립</div></div>
      <div class="stat-card"><div class="stat-label">트립어드바이저 평점</div><div class="stat-value" style="color:${scoreColor(tScore*2)}">${tScore?+(tScore*2).toFixed(1):'-'}</div><div class="stat-sub">원점수 ${tScore}/5</div></div>
      <div class="stat-card"><div class="stat-label">OTA 평균 환산점수</div><div class="stat-value" style="color:${scoreColor(otaAvgBranch)}">${otaAvgBranch?otaAvgBranch.toFixed(2):'-'}</div><div class="stat-sub">10점 만점</div></div>
    </div>
    <div class="section-label">채널별 평점 (10점 만점 환산)</div>
    <div class="channel-grid">
      ${channelCards.map(c=>{
        const pct=(c.score/10*100).toFixed(0);
        const col=scoreColor(c.score);
        return`<div class="channel-card">
          <div class="channel-name">${c.name}</div>
          <div class="channel-score" style="color:${col}">${c.score||'-'}<span style="font-size:12px;color:var(--text2);font-weight:400;"> /10</span></div>
          <div class="channel-sub">${c.sub}</div>
          <div class="channel-bar-wrap"><div class="channel-bar" style="width:${pct}%;background:${col}"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">구글 평점 추이 (최근 16주)</div>
        <div style="position:relative;height:180px;"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">주간 후기 증감</div>
        <div class="increase-list">
          ${recent.map((p,i)=>{const v=gIncTrend[i];const mx=Math.max(...gIncTrend.map(Math.abs),1);return`<div class="increase-item"><div class="increase-label">${p.split('~')[0].trim().split('.').slice(1).join('/')}</div><div class="increase-bar-wrap"><div class="increase-bar" style="width:${(Math.abs(v)/mx*100).toFixed(0)}%;background:${v>=0?'var(--green)':'var(--red)'}"></div></div><div class="increase-val" style="color:${v>=0?'var(--green)':'var(--red)'}">${v>=0?'+':''}${v}</div></div>`;}).join('')}
        </div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">주차별 상세 데이터</div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="border-bottom:1px solid var(--border);">
            <th style="padding:8px 10px;text-align:left;color:var(--text2);font-weight:500;">주차</th>
            <th style="padding:8px 10px;text-align:right;color:var(--text2);font-weight:500;">구글 후기수</th>
            <th style="padding:8px 10px;text-align:right;color:var(--text2);font-weight:500;">증감</th>
            <th style="padding:8px 10px;text-align:right;color:var(--text2);font-weight:500;">구글 평점</th>
            <th style="padding:8px 10px;text-align:right;color:var(--text2);font-weight:500;">트립 평점</th>
          </tr></thead>
          <tbody>
            ${recent.slice().reverse().map(p=>{
              const g=gRows.find(d=>d.주차===p);
              const t=tripData.find(d=>d.지점===b&&d.주차===p);
              const isCur=p===currentPeriod;
              return`<tr style="border-top:1px solid var(--border);${isCur?'background:rgba(91,141,238,0.06);':''}">
                <td style="padding:7px 10px;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;">${p}</td>
                <td style="padding:7px 10px;text-align:right;">${g?g.후기갯수.toLocaleString():'-'}</td>
                <td style="padding:7px 10px;text-align:right;color:${g&&g.증감>0?'var(--green)':g&&g.증감<0?'var(--red)':'var(--text2)'}">${g?(g.증감>0?'+':'')+g.증감:'-'}</td>
                <td style="padding:7px 10px;text-align:right;color:${g?scoreColor(g.평점*2):'var(--text2)'};">${g?g.평점:'-'}</td>
                <td style="padding:7px 10px;text-align:right;color:${t&&t.평점?scoreColor(t.평점*2):'var(--text2)'};">${t&&t.평점?t.평점:'-'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  setTimeout(()=>{
    if(trendChart)trendChart.destroy();
    const ctx=document.getElementById('trendChart');
    if(!ctx)return;
    trendChart=new Chart(ctx,{
      type:'line',
      data:{labels:recent.map(p=>p.split('~')[0].trim().split('.').slice(1).join('/')),datasets:[{label:'구글 평점',data:gTrend,borderColor:'#ea4335',backgroundColor:'#ea433520',tension:0.3,pointRadius:4,borderWidth:2,fill:true,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7f8ba8',font:{size:10},maxRotation:45},grid:{color:'#252a3d'}},y:{ticks:{color:'#7f8ba8',font:{size:10}},grid:{color:'#252a3d'},min:1,max:5}}}
    });
  },50);
}

function selectBranchByName(name){
  document.querySelectorAll('#branchMenu .menu-item').forEach(el=>{
    if(el.textContent.trim()===name)selectBranch(name,el);
  });
}

loadAll();
</script>
</body>
</html>
