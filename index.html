<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbanstay 후기 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fa;--sidebar:#ffffff;--card:#ffffff;--card2:#f0f2f8;--accent:#4a7cf7;--green:#22c97a;--red:#e85555;--yellow:#f0900a;--text:#1a1d2e;--text2:#6b7599;--text3:#a0a8c0;--border:#e2e6f0;--border2:#d0d6e8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-logo{padding:20px 16px 12px;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;border-bottom:1px solid var(--border);}
.sidebar-logo span{display:block;font-size:11px;font-weight:400;color:var(--text2);margin-top:2px;}
.sidebar-menu{flex:1;overflow-y:auto;padding:8px 0;}
.sidebar-menu::-webkit-scrollbar{width:3px;}
.sidebar-menu::-webkit-scrollbar-thumb{background:var(--border2);}
.menu-item{padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;}
.menu-item:hover{color:var(--text);background:rgba(74,124,247,0.06);}
.menu-item.active{color:var(--accent);background:rgba(74,124,247,0.1);border-left-color:var(--accent);}
.menu-section{padding:12px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:700;}
.period-select{background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;}
.topbar-meta{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-value{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:5px;}
.up{color:var(--green);}.down{color:var(--red);}
.charts-row{display:grid;grid-template-columns:1fr 360px;gap:12px;margin-bottom:20px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.chart-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rank-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;}
.rank-list::-webkit-scrollbar{width:3px;}
.rank-list::-webkit-scrollbar-thumb{background:var(--border2);}
.rank-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background 0.15s;}
.rank-item:hover{background:rgba(74,124,247,0.08);}
.rank-num{font-size:10px;font-weight:700;color:var(--text3);width:14px;text-align:center;font-family:'DM Mono',monospace;}
.rank-name{font-size:12px;flex:1;color:var(--text);}
.rank-bar-wrap{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rank-bar{height:100%;border-radius:2px;}
